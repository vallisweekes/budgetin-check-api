trigger:
  branches:
    include:
      - dev
      - main

pr:
  branches:
    include:
      - dev
      - main

variables:
  azureLocation: uksouth
  dotNetSdkVersion: 8.x
  buildConfiguration: Release
  projectPath: src/BudgetinCheck.Api/BudgetinCheck.Api.csproj
  dockerfilePath: src/BudgetinCheck.Api/Dockerfile
  dockerBuildContext: .
  imageRepository: budgetin-check-api
  containerPort: 8080

  containerRegistrySku: Basic

  nonProdAzureServiceConnection: sc-budgetin-check-api-azure
  nonProdResourceGroupName: rg-vw-budgetapp-api-dev-uks-001
  nonProdContainerRegistryResourceGroupName: $(nonProdResourceGroupName)
  nonProdContainerRegistryName: crvwbudgetappapidevuks001
  nonProdContainerRegistryLoginServer: crvwbudgetappapidevuks001.azurecr.io
  nonProdAppServicePlanName: asp-budgetin-check-api-nonprod
  nonProdWebAppName: app-budgetin-check-api-nonprod
  nonProdAppServicePlanSku: B1
  nonProdImageTag: nonprod-$(Build.BuildId)
  nonProdBudgetDbConnectionString: ''
  nonProdLegacyNextJsBaseUrl: ''
  nonProdLegacyNextJsTimeoutSeconds: 100
  nonProdBudgetDataSpendingDataRoot: ''

  prodAzureServiceConnection: sc-budgetin-check-api-azure-prod
  prodResourceGroupName: rg-vw-budgetapp-api-prd-uks-001
  prodContainerRegistryResourceGroupName: $(prodResourceGroupName)
  prodContainerRegistryName: crvwbudgetappapiprduks001
  prodContainerRegistryLoginServer: crvwbudgetappapiprduks001.azurecr.io
  prodAppServicePlanName: asp-budgetin-check-api-prod
  prodWebAppName: app-budgetin-check-api-prod
  prodAppServicePlanSku: B1
  prodImageTag: prod-$(Build.BuildId)
  prodBudgetDbConnectionString: ''
  prodLegacyNextJsBaseUrl: ''
  prodLegacyNextJsTimeoutSeconds: 100
  prodBudgetDataSpendingDataRoot: ''

stages:
  - stage: Validate
    displayName: Validate API
    jobs:
      - job: DotNetBuild
        displayName: Restore and build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET SDK $(dotNetSdkVersion)
            inputs:
              packageType: sdk
              version: $(dotNetSdkVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: BudgetinCheck.sln

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: BudgetinCheck.sln
              arguments: --configuration $(buildConfiguration) --no-restore

  - stage: Build_NonProd
    displayName: Build non-prod container
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - job: BuildNonProdImage
        displayName: Build and push non-prod image
        pool:
          vmImage: ubuntu-latest
        steps:
          - template: templates/build-and-push-container.yml
            parameters:
              azureServiceConnection: $(nonProdAzureServiceConnection)
              azureLocation: $(azureLocation)
              containerRegistryResourceGroupName: $(nonProdContainerRegistryResourceGroupName)
              containerRegistryName: $(nonProdContainerRegistryName)
              containerRegistrySku: $(containerRegistrySku)
              imageRepository: $(imageRepository)
              imageTag: $(nonProdImageTag)
              latestTag: nonprod-latest
              dockerfilePath: $(dockerfilePath)
              dockerBuildContext: $(dockerBuildContext)

  - stage: Deploy_NonProd
    displayName: Deploy non-prod
    dependsOn: Build_NonProd
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    variables:
      - name: resourceGroupName
        value: $(nonProdResourceGroupName)
      - name: appServicePlanName
        value: $(nonProdAppServicePlanName)
      - name: webAppName
        value: $(nonProdWebAppName)
      - name: appServicePlanSku
        value: $(nonProdAppServicePlanSku)
      - name: containerImage
        value: $(nonProdContainerRegistryLoginServer)/$(imageRepository):$(nonProdImageTag)
      - name: aspNetCoreEnvironment
        value: Development
      - name: BudgetDbConnectionString
        value: $(nonProdBudgetDbConnectionString)
      - name: LegacyNextJsBaseUrl
        value: $(nonProdLegacyNextJsBaseUrl)
      - name: LegacyNextJsTimeoutSeconds
        value: $(nonProdLegacyNextJsTimeoutSeconds)
      - name: BudgetDataSpendingDataRoot
        value: $(nonProdBudgetDataSpendingDataRoot)
    jobs:
      - deployment: DeployNonProd
        displayName: Deploy non-prod Web App for Containers
        environment: budgetin-check-api-nonprod
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/provision-container-webapp.yml
                  parameters:
                    azureServiceConnection: $(nonProdAzureServiceConnection)
                    azureLocation: $(azureLocation)
                    containerRegistryResourceGroupName: $(nonProdContainerRegistryResourceGroupName)
                    containerRegistryName: $(nonProdContainerRegistryName)
                    containerRegistryLoginServer: $(nonProdContainerRegistryLoginServer)
                    resourceGroupName: $(resourceGroupName)
                    appServicePlanName: $(appServicePlanName)
                    appServicePlanSku: $(appServicePlanSku)
                    webAppName: $(webAppName)
                    containerImage: $(containerImage)
                    containerPort: $(containerPort)
                    aspNetCoreEnvironment: $(aspNetCoreEnvironment)

  - stage: Build_Prod
    displayName: Build prod container
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildProdImage
        displayName: Build and push prod image
        pool:
          vmImage: ubuntu-latest
        steps:
          - template: templates/build-and-push-container.yml
            parameters:
              azureServiceConnection: $(prodAzureServiceConnection)
              azureLocation: $(azureLocation)
              containerRegistryResourceGroupName: $(prodContainerRegistryResourceGroupName)
              containerRegistryName: $(prodContainerRegistryName)
              containerRegistrySku: $(containerRegistrySku)
              imageRepository: $(imageRepository)
              imageTag: $(prodImageTag)
              latestTag: prod-latest
              dockerfilePath: $(dockerfilePath)
              dockerBuildContext: $(dockerBuildContext)

  - stage: Deploy_Prod
    displayName: Deploy prod
    dependsOn: Build_Prod
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - name: resourceGroupName
        value: $(prodResourceGroupName)
      - name: appServicePlanName
        value: $(prodAppServicePlanName)
      - name: webAppName
        value: $(prodWebAppName)
      - name: appServicePlanSku
        value: $(prodAppServicePlanSku)
      - name: containerImage
        value: $(prodContainerRegistryLoginServer)/$(imageRepository):$(prodImageTag)
      - name: aspNetCoreEnvironment
        value: Production
      - name: BudgetDbConnectionString
        value: $(prodBudgetDbConnectionString)
      - name: LegacyNextJsBaseUrl
        value: $(prodLegacyNextJsBaseUrl)
      - name: LegacyNextJsTimeoutSeconds
        value: $(prodLegacyNextJsTimeoutSeconds)
      - name: BudgetDataSpendingDataRoot
        value: $(prodBudgetDataSpendingDataRoot)
    jobs:
      - deployment: DeployProd
        displayName: Deploy prod Web App for Containers
        environment: budgetin-check-api-prod
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/provision-container-webapp.yml
                  parameters:
                    azureServiceConnection: $(prodAzureServiceConnection)
                    azureLocation: $(azureLocation)
                    containerRegistryResourceGroupName: $(prodContainerRegistryResourceGroupName)
                    containerRegistryName: $(prodContainerRegistryName)
                    containerRegistryLoginServer: $(prodContainerRegistryLoginServer)
                    resourceGroupName: $(resourceGroupName)
                    appServicePlanName: $(appServicePlanName)
                    appServicePlanSku: $(appServicePlanSku)
                    webAppName: $(webAppName)
                    containerImage: $(containerImage)
                    containerPort: $(containerPort)
                    aspNetCoreEnvironment: $(aspNetCoreEnvironment)