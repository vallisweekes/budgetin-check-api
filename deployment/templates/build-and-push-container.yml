parameters:
  azureServiceConnection: ''
  azureLocation: ''
  containerRegistryResourceGroupName: ''
  containerRegistryName: ''
  containerRegistrySku: ''
  imageRepository: ''
  imageTag: ''
  latestTag: ''
  dockerfilePath: ''
  dockerBuildContext: ''

steps:
  - task: AzureCLI@2
    displayName: Build and push ${{ parameters.imageTag }}
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        registry_group='${{ parameters.containerRegistryResourceGroupName }}'
        location='${{ parameters.azureLocation }}'
        registry='${{ parameters.containerRegistryName }}'
        registry_sku='${{ parameters.containerRegistrySku }}'
        image_repository='${{ parameters.imageRepository }}'
        image_tag='${{ parameters.imageTag }}'
        latest_tag='${{ parameters.latestTag }}'
        dockerfile_path='${{ parameters.dockerfilePath }}'
        docker_build_context='${{ parameters.dockerBuildContext }}'

        az group create \
          --name "$registry_group" \
          --location "$location"

        if ! az acr show --resource-group "$registry_group" --name "$registry" >/dev/null 2>&1; then
          name_available=$(az acr check-name --name "$registry" --query nameAvailable -o tsv)
          if [[ "$name_available" != "true" ]]; then
            echo "ACR name '$registry' is not available. Change containerRegistryName in deployment/azure-pipelines.yml."
            exit 1
          fi

          az acr create \
            --name "$registry" \
            --resource-group "$registry_group" \
            --location "$location" \
            --sku "$registry_sku"
        fi

        az acr login --name "$registry"
        login_server=$(az acr show --resource-group "$registry_group" --name "$registry" --query loginServer -o tsv)

        docker build \
          --file "$dockerfile_path" \
          --tag "$login_server/$image_repository:$image_tag" \
          --tag "$login_server/$image_repository:$latest_tag" \
          "$docker_build_context"

        docker push "$login_server/$image_repository:$image_tag"
        docker push "$login_server/$image_repository:$latest_tag"